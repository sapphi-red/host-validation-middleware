name: CI

on:
  push:
    branches:
      - 'main'
  pull_request:

permissions: {}

jobs:
  lint:
    name: run lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-repo
      - run: pnpm run lint
  format:
    name: run format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-repo
      - run: pnpm run format --check
  build:
    name: run build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-repo
      - run: pnpm run build
  test:
    name: run test
    needs: [build]
    strategy:
      matrix:
        node_version: [18.x, 24.x]
        os: [ubuntu-latest]
        include:
          - node_version: 22.x
            os: windows-latest
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-repo
        with:
          node-version: ${{ matrix.node_version }}
      - run: pnpm run test
